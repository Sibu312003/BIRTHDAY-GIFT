<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday My Love ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
overflow-x:hidden;
background:linear-gradient(-45deg,#ff4d6d,#ff758f,#ff8fa3,#ffc2d1);
background-size:400% 400%;
animation:bg 12s ease infinite;
min-height:100vh;
color:white;
text-align:center;
}

@keyframes bg{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

.hero{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
padding:20px;
}

h1{
font-size:4rem;
text-shadow:0 10px 25px rgba(0,0,0,.3);
animation:float 3s infinite ease-in-out;
}

@keyframes float{
50%{transform:translateY(-15px);}
}

.typing{
font-size:1.5rem;
margin-top:20px;
min-height:60px;
}

.btn{
padding:15px 35px;
border:none;
border-radius:50px;
font-size:18px;
cursor:pointer;
margin-top:25px;
background:white;
color:#ff4d6d;
font-weight:bold;
}

.gallery{
padding:60px 20px;
}

.gallery h2{
margin-bottom:30px;
}

.photos{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:20px;
}

.photos img{
width:250px;
height:300px;
object-fit:cover;
border-radius:20px;
transition:.5s;
box-shadow:0 15px 30px rgba(0,0,0,.3);
}

.photos img:hover{
transform:rotateY(15deg) scale(1.08);
}

.heart{
position:fixed;
font-size:30px;
animation:rise 8s linear infinite;
pointer-events:none;
}

@keyframes rise{
from{
transform:translateY(100vh);
opacity:1;
}
to{
transform:translateY(-100px);
opacity:0;
}
}

.message{
padding:50px;
font-size:1.3rem;
line-height:2;
max-width:900px;
margin:auto;
}

canvas{
position:fixed;
top:0;
left:0;
pointer-events:none;
}
</style>
</head>

<body>

<canvas id="fireworks"></canvas>

<section class="hero">
<h1>🎂 Happy Birthday My Love ❤️</h1>

<div class="typing" id="typing"></div>

<button class="btn" onclick="playMusic()">
🎵 Play Music
</button>

<audio id="music" loop>
<source src="birthday.mp3" type="audio/mpeg">
</audio>
</section>

<section class="gallery">
<h2>📸 Our Beautiful Memories</h2>

<div class="photos">
<img src="photo1.jpg">
<img src="photo2.jpg">
<img src="photo3.jpg">
<img src="photo4.jpg">
</div>
</section>

<section class="message">
💖 My Dearest Love,

On your special day, I wish you endless happiness,
success, and beautiful memories.

Thank you for bringing love, joy, and magic into my life.

You are my today, my tomorrow,
and my forever.

❤️ Happy Birthday, My Queen ❤️
</section>

<script>

/* Typing Effect */
const text =
"Every love story is beautiful, but ours is my favorite. ❤️";

let i = 0;

function typeWriter(){
if(i < text.length){
document.getElementById("typing").innerHTML += text.charAt(i);
i++;
setTimeout(typeWriter,80);
}
}

typeWriter();

/* Music */
function playMusic(){
document.getElementById("music").play();
}

/* Floating Hearts */
function createHeart(){

const heart = document.createElement("div");

heart.classList.add("heart");
heart.innerHTML="❤️";

heart.style.left=Math.random()*100+"vw";
heart.style.fontSize=Math.random()*25+20+"px";

document.body.appendChild(heart);

setTimeout(()=>{
heart.remove();
},8000);
}

setInterval(createHeart,300);

/* Fireworks */
const canvas=document.getElementById("fireworks");
const ctx=canvas.getContext("2d");

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let particles=[];

function firework(){

for(let i=0;i<100;i++){

particles.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height/2,
radius:Math.random()*3,
vx:(Math.random()-0.5)*6,
vy:(Math.random()-0.5)*6,
life:100
});

}
}

setInterval(firework,1500);

function animate(){

requestAnimationFrame(animate);

ctx.clearRect(0,0,canvas.width,canvas.height);

particles.forEach((p,index)=>{

p.x+=p.vx;
p.y+=p.vy;
p.life--;

ctx.beginPath();
ctx.arc(p.x,p.y,p.radius,0,Math.PI*2);
ctx.fillStyle=`hsl(${Math.random()*360},100%,50%)`;
ctx.fill();

if(p.life<=0){
particles.splice(index,1);
}
});
}

animate();

</script>

</body>
</html>
